name: Build nova APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Create keystore
        run: keytool -genkey -v -keystore nova.keystore -alias nova -keyalg RSA -keysize 2048 -validity 10000 -storepass ninja786 -keypass ninja786 -dname "CN=nova, OU=nova, O=nova, L=IN, S=IN, C=IN"

      - name: Build Release APK
        run: gradle assembleRelease -Pandroid.injected.signing.store.file=$PWD/nova.keystore -Pandroid.injected.signing.store.password=ninja786 -Pandroid.injected.signing.key.alias=nova -Pandroid.injected.signing.key.password=ninja786

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nova-release-apk
          path: app/build/outputs/apk/release/app-release.apk
